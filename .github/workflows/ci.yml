name: claw-bench CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Build dashboard
        run: npm ci --prefix dashboard && npm run dashboard:build

      - name: Run test suite
        run: node --test dist/test/bench.test.js

      - name: Smoke-test against echo-skill
        run: |
          node dist/cli.js run ./test-skills/echo-skill \
            --output-dir ./bench-reports
        # Consistency will score 0 without Ollama — expected in CI.
        # The smoke test validates the harness runs end-to-end without crashing.

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: bench-reports/benchmark-report.json
          retention-days: 30

  # Optional job: push to leaderboard on merge to main.
  # Requires CLAWHUB_API_KEY set as a repository secret.
  push-leaderboard:
    name: Push to ClawHub leaderboard
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Benchmark
        run: |
          node dist/cli.js run ./test-skills/echo-skill \
            --output-dir ./bench-reports

      - name: Push to leaderboard
        env:
          CLAWHUB_API_KEY: ${{ secrets.CLAWHUB_API_KEY }}
        run: node dist/cli.js push --input ./bench-reports/benchmark-report.json
        # Skipped silently if CLAWHUB_API_KEY secret is not set.
        continue-on-error: true
