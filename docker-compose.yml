# claw-bench dashboard + API + SQLite on a named volume.
# Usage:
#   docker compose up --build
#   open http://localhost:3077
#
# Optional: mount a crawled seed file:
#   volumes:
#     - ./clawhub/skills-seed.json:/app/clawhub/skills-seed.json:ro

services:
  claw-bench:
    build: .
    image: claw-bench:local
    ports:
      - "3077:3077"
    environment:
      CLAW_BENCH_DB: /data/bench.db
      # OLLAMA_HOST: http://host.docker.internal:11434   # if benchmarking with Ollama on the host (Mac/Win)
    volumes:
      - clawbench-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3077/api/stats').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  clawbench-data:
